name: Build NEWAPI-QIQI image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: yizhixiaohaitun/newapi-qiqi

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="newapi-qiqi-$(date -u +'%Y%m%d')-${SHORT_SHA}"
          echo "$VERSION" > VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=local-riskfix-final-20260718
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### NEWAPI-QIQI image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/yizhixiaohaitun/newapi-qiqi:main" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/yizhixiaohaitun/newapi-qiqi:${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/yizhixiaohaitun/newapi-qiqi:sha-${{ steps.version.outputs.short_sha }}" >> "$GITHUB_STEP_SUMMARY"
